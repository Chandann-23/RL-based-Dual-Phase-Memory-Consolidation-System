<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>RL Memory System</title>
  <link rel="icon" href="https://cdn-icons-png.flaticon.com/512/2103/2103633.png" type="image/png">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet"/>
  <style>
    :root {
      /* Command Center Color Palette */
      --bg-main: #000000;
      --bg-gradient: linear-gradient(180deg, #000000 0%, #000000 100%);
      --bg-chat-panel: #000000;
      --bg-surface: rgba(255, 255, 255, 0.06);
      --bg-component: rgba(255, 255, 255, 0.04);
      --border-glass: #333;
      --border-slate: #4A5568;
      --text-primary: #FFFFFF;
      --text-secondary: #9EA1A8;
      --text-black: #000000;
      --gradient-user: linear-gradient(135deg, #420781 0%, #020367 100%);
      --gradient-bot: #2F3136;
      --gradient-sidebar: linear-gradient(to top, #002366 0%, #000000 100%);
      --accent-professional: #4A9EFF;
      --accent-muted: #5A6B7B;
      --importance-high: #6B7F7B;
      --importance-low: #5A5A5A;
      --mono: 'JetBrains Mono', monospace;
      --sans: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      overflow: hidden;
    }

    body {
      background: var(--bg-gradient);
      color: var(--text-primary);
      font-family: var(--sans);
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    .main-container {
      display: flex;
      flex-direction: row;
      flex: 1;
      overflow: hidden;
    }

    /* ── Header ── */
    header {
      padding: 24px;
      border-bottom: 1px solid var(--border-glass);
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--bg-surface);
      backdrop-filter: blur(8px);
      height: 100px;
      flex-shrink: 0;
      position: relative;
    }

    .header-title {
      display: flex;
      flex-direction: column;
      align-items: center;
      flex: 1;
    }

    header h2 {
      font-size: 1.8rem;
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: 8px;
      text-align: center;
    }

    header .description {
      font-size: 0.9rem;
      font-weight: 500;
      background: linear-gradient(90deg, #FF69B4 0%, #4A9EFF 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      text-align: center;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .mobile-toggle {
      display: none;
      background: transparent;
      border: 1px solid var(--accent-professional);
      color: var(--accent-professional);
      padding: 6px 12px;
      border-radius: 4px;
      cursor: pointer;
      font-family: var(--mono);
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      transition: all 0.15s ease;
    }

    .mobile-toggle:hover {
      background: var(--accent-professional);
      color: var(--text-primary);
    }

    .agent-stats-header {
      display: flex;
      gap: 16px;
      font-family: var(--mono);
      font-size: 0.7rem;
      color: var(--text-primary);
    }

    .agent-stats-header b { color: var(--accent-professional); }

    /* ── Chat Panel ── */
    .chat-panel {
      display: flex;
      flex-direction: column;
      border-right: 1px solid var(--border-glass);
      min-height: 0;
      overflow: hidden;
      background: var(--bg-chat-panel);
      backdrop-filter: blur(8px);
      border-radius: 12px;
      margin: 12px;
      padding: 16px;
      width: 70%;
      flex-shrink: 0;
    }

    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      min-height: 0;
    }

    .msg {
      display: flex;
      flex-direction: column;
      gap: 6px;
      max-width: 88%;
    }

    .msg.user { align-self: flex-end; align-items: flex-end; }
    .msg.bot  { align-self: flex-start; }

    .bubble {
      padding: 12px 16px;
      border-radius: 8px;
      font-size: 0.85rem;
      line-height: 1.5;
      font-weight: 400;
      transition: all 0.15s ease;
    }

    .msg.user .bubble {
      background: var(--gradient-user);
      color: var(--text-primary);
      border-bottom-right-radius: 4px;
    }

    .msg.bot .bubble {
      background: var(--gradient-bot);
      color: var(--text-primary);
      border: 1px solid var(--border-glass);
      border-bottom-left-radius: 4px;
    }

    .show-details-btn {
      font-family: var(--mono);
      font-size: 0.65rem;
      padding: 4px 12px;
      border: 1px solid var(--accent-professional);
      border-radius: 16px;
      background: transparent;
      color: var(--accent-professional);
      cursor: pointer;
      width: fit-content;
      transition: all 0.15s ease;
    }

    .show-details-btn:hover {
      background: var(--accent-professional);
      color: var(--text-primary);
    }

    .memory-breakdown {
      background: var(--bg-component);
      border: 1px solid var(--border-glass);
      border-radius: 8px;
      padding: 12px;
      font-family: var(--mono);
      font-size: 0.7rem;
      display: none;
      flex-direction: column;
      gap: 10px;
      margin-top: 6px;
      backdrop-filter: blur(6px);
    }

    .memory-breakdown.open { display: flex; }

    .breakdown-section h4 {
      color: var(--text-secondary);
      text-transform: uppercase;
      font-size: 0.6rem;
      letter-spacing: 1px;
      margin-bottom: 6px;
      font-weight: 500;
    }

    .concept-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 4px 0;
      border-bottom: 1px solid var(--border-glass);
      gap: 6px;
    }

    .concept-row:last-child { border-bottom: none; }
    .concept-name { color: var(--accent-professional); font-weight: 500; min-width: 60px; font-family: var(--mono); }

    .importance-bar-wrap {
      width: 60px;
      height: 4px;
      background: #1A1A1A;
      border-radius: 2px;
      overflow: hidden;
      flex-shrink: 0;
    }

    .importance-bar {
      height: 100%;
      border-radius: 2px;
    }

    .action-badge {
      display: inline-block;
      padding: 2px 6px;
      border-radius: 2px;
      font-size: 0.55rem;
      font-weight: 400;
      font-family: var(--mono);
      letter-spacing: 0.5px;
      flex-shrink: 0;
      text-transform: uppercase;
    }

    .badge-STORE     { background: rgba(107, 127, 123, 0.2); color: var(--importance-high); border: 1px solid rgba(107, 127, 123, 0.3); }
    .badge-REINFORCE { background: rgba(74, 158, 255, 0.2); color: var(--accent-professional); border: 1px solid rgba(74, 158, 255, 0.3); }
    .badge-REMOVE    { background: rgba(90, 90, 90, 0.2); color: var(--importance-low); border: 1px solid rgba(90, 90, 90, 0.3); }

    .reasons-list { list-style: none; display: flex; flex-direction: column; gap: 3px; }
    .reasons-list li::before { content: "→ "; color: var(--accent-professional); }

    /* ── Input ── */
    .input-area {
      padding: 12px 16px;
      border-top: 1px solid var(--border-glass);
      display: flex;
      gap: 8px;
      background: transparent;
      flex-shrink: 0;
      margin: 0 12px 12px 12px;
    }

    .input-area input {
      flex: 1;
      background: transparent;
      border: 1px solid var(--border-slate);
      border-radius: 4px;
      padding: 8px 12px;
      color: var(--text-primary);
      font-family: var(--mono);
      font-size: 0.85rem;
      outline: none;
      transition: border-color 0.15s ease;
    }

    .input-area input:focus { 
      border-color: var(--accent-professional);
    }

    .input-area input::placeholder {
      color: var(--text-secondary);
    }

    .input-area button {
      background: transparent;
      color: var(--accent-professional);
      border: 1px solid var(--accent-professional);
      border-radius: 4px;
      padding: 8px 12px;
      font-family: var(--mono);
      font-weight: 400;
      font-size: 0.75rem;
      cursor: pointer;
      transition: all 0.15s ease;
      flex-shrink: 0;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .input-area button:hover { 
      background: var(--accent-professional);
      color: var(--text-primary);
    }

    /* ── Sidebar ── */
    .sidebar {
      background: var(--gradient-sidebar);
      backdrop-filter: blur(8px);
      display: flex;
      flex-direction: column;
      min-height: 0;
      overflow: hidden;
      border-radius: 12px;
      margin: 12px 12px 12px 0;
      padding: 16px;
      color: var(--text-primary);
      width: 30%;
      flex-shrink: 0;
    }

    .sidebar-top {
      flex-shrink: 0;
      padding: 16px 16px;
      border-bottom: 1px solid var(--border-glass);
      border-radius: 12px 12px 0 0;
      background: var(--bg-surface);
      backdrop-filter: blur(10px);
    }

    .sidebar-top h3 {
      font-size: 0.65rem;
      text-transform: uppercase;
      letter-spacing: 1.2px;
      color: var(--text-primary);
      margin-bottom: 12px;
      font-weight: 500;
      font-family: var(--sans);
    }

    .persistent-scroll {
      max-height: 160px;
      overflow-y: auto;
      padding: 0 16px;
      border-radius: 0 0 12px 12px;
      background: var(--bg-surface);
      backdrop-filter: blur(10px);
    }

    .mem-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 6px 0;
      border-bottom: 1px solid var(--border-glass);
      font-family: var(--mono);
      font-size: 0.68rem;
    }

    .mem-item:last-child { border: none; }
    .mem-key { color: var(--accent-professional); font-weight: 500; font-family: var(--mono); }
    .mem-val { color: var(--text-secondary); font-family: var(--mono); }

    .sidebar-log {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-height: 0;
      overflow: hidden;
    }

    .sidebar-log h3 {
      font-size: 0.65rem;
      text-transform: uppercase;
      letter-spacing: 1.2px;
      color: var(--text-primary);
      padding: 16px 16px 8px;
      flex-shrink: 0;
      font-weight: 500;
    }

    .log-scroll {
      flex: 1;
      overflow-y: auto;
      padding: 0 16px 16px;
    }

    .log-entry {
      font-family: var(--mono);
      font-size: 0.68rem;
      padding: 6px 0;
      border-bottom: 1px solid var(--border-glass);
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .log-entry:last-child { border: none; }

    .empty-state {
      color: var(--text-secondary);
      font-size: 0.75rem;
      font-family: var(--sans);
      font-weight: 400;
      padding: 8px 0;
    }

    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border-glass); border-radius: 2px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--accent-muted); }

    /* ── Mobile Responsive ── */
    @media (max-width: 768px) {
      .main-container {
        flex-direction: column;
      }

      header h2 {
        font-size: 1.4rem;
      }

      header .description {
        font-size: 0.8rem;
      }

      .mobile-toggle {
        display: block;
      }

      .chat-panel {
        border-right: none;
        margin: 12px;
        border-radius: 12px;
        width: 100%;
      }

      .sidebar {
        position: fixed;
        top: 100px;
        right: 0;
        width: 280px;
        height: calc(100vh - 100px);
        margin: 0;
        border-radius: 0;
        border-left: 1px solid var(--border-glass);
        transform: translateX(100%);
        z-index: 1000;
        transition: transform 0.3s ease;
      }

      .sidebar.open {
        transform: translateX(0);
      }

      .sidebar-overlay {
        display: none;
        position: fixed;
        top: 100px;
        left: 0;
        width: 100%;
        height: calc(100vh - 100px);
        background: rgba(0, 0, 0, 0.5);
        z-index: 999;
      }

      .sidebar-overlay.show {
        display: block;
      }
    }
  </style>
</head>
<body>

<header>
  <div class="header-title">
    <h2>RL Memory System</h2>
    <div class="description">
      <span>RL-Driven Dual-Phase Memory Engine</span>
      <button class="mobile-toggle" onclick="toggleSidebar()">☰ Stats</button>
    </div>
  </div>
  <div class="agent-stats-header" id="agentStats">
    <span>Steps: <b>0</b></span>
    <span>ε: <b>0.300</b></span>
    <span>Avg Reward: <b>—</b></span>
  </div>
</header>

<!-- Main Container -->
<div class="main-container">
  <!-- Chat Panel -->
  <div class="chat-panel">
    <div class="messages" id="messages">
      <div class="msg bot">
        <div class="bubble">Hey! Talk to me — I'll remember what matters using reinforcement learning. 🧠</div>
      </div>
    </div>
    <div class="input-area">
      <input type="text" id="userInput" placeholder="Type something..." />
      <button onclick="sendMessage()">Send</button>
    </div>
  </div>

  <!-- Sidebar -->
  <div class="sidebar">
    <div class="sidebar-top">
      <h3>📌 Persistent Memory</h3>
      <div class="persistent-scroll">
        <div id="persistentMemory"><p class="empty-state">Nothing stored yet.</p></div>
      </div>
    </div>
    <div class="sidebar-log">
      <h3>⚡ Consolidation Log</h3>
      <div class="log-scroll" id="consolidationLog">
        <p class="empty-state">Runs every 3 interactions.</p>
      </div>
    </div>
  </div>
</div>

<!-- Sidebar Overlay (for mobile) -->
<div class="sidebar-overlay" onclick="toggleSidebar()"></div>

<script type="module">
  /**
   * API Configuration
   * Use environment variable for production, fallback to localhost for development
   */
  const API_BASE = import.meta.env.VITE_API_URL || "http://localhost:10000";
  // Remove trailing slash to prevent double slashes
  const API = API_BASE.replace(/\/$/, "");

  document.getElementById("userInput").addEventListener("keydown", e => {
    if (e.key === "Enter") sendMessage();
  });

  // Expose functions to global scope for HTML event handlers
  window.sendMessage = sendMessage;
  window.toggleBreakdown = toggleBreakdown;
  window.toggleSidebar = toggleSidebar;

  async function sendMessage() {
    const input = document.getElementById("userInput");
    const text = input.value.trim();
    if (!text) return;
    input.value = "";

    appendMessage("user", text);
    
    console.log("Requesting backend at:", API);

    try {
      const res = await fetch(`${API}/chat`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ message: text }),
      });
      const data = await res.json();
      appendBotMessage(data.response, data.memory_details);
      updateAgentStats(data.agent_stats);
      updatePersistentMemory(data.persistent_memory);
      updateConsolidationLog(data.consolidation_log);
    } catch (err) {
      appendMessage("bot", "⚠️ Could not reach backend. Make sure Flask is running.");
    }
  }

  function appendMessage(role, text) {
    const msgs = document.getElementById("messages");
    const div = document.createElement("div");
    div.className = `msg ${role}`;
    div.innerHTML = `<div class="bubble">${text}</div>`;
    msgs.appendChild(div);
    msgs.scrollTop = msgs.scrollHeight;
  }

  function appendBotMessage(text, memDetails) {
    const msgs = document.getElementById("messages");
    const msgDiv = document.createElement("div");
    msgDiv.className = "msg bot";

    let breakdownHTML = "";
    if (memDetails && memDetails.length) {
      const conceptsStr = memDetails.map(m => m.concept).join(", ");
      const conceptRows = memDetails.map(m => {
        const impPct = Math.round(m.importance * 100);
        // Traffic-light frequency colors
        let freqColor;
        if (m.frequency === 1) {
          freqColor = "#FF4B2B"; // Red
        } else if (m.frequency === 2) {
          freqColor = "#FFD200"; // Yellow/Amber
        } else {
          freqColor = "#00C851"; // Green for 3+
        }
        return `
          <div class="concept-row">
            <span class="concept-name">${m.concept}</span>
            <span style="color:var(--muted)">${m.frequency}</span>
            <div class="importance-bar-wrap">
              <div class="importance-bar" style="width:${impPct}%;background:${freqColor}"></div>
            </div>
            <span style="font-weight:600;font-size:0.68rem">${m.importance}</span>
            <span class="action-badge badge-${m.action}">${m.action}</span>
          </div>`;
      }).join("");

      const reasonsHTML = (memDetails[0]?.reasons || []).map(r => `<li>${r}</li>`).join("");

      breakdownHTML = `
        <div class="memory-breakdown">
          <div class="breakdown-section">
            <h4>Detected Concepts</h4>
            <p style="color:var(--accent2);font-weight:600;font-size:0.72rem">${conceptsStr}</p>
          </div>
          <div class="breakdown-section">
            <h4>Importance + RL Decision</h4>
            ${conceptRows}
          </div>
          <div class="breakdown-section">
            <h4>Reasons (top concept)</h4>
            <ul class="reasons-list">${reasonsHTML}</ul>
          </div>
        </div>`;
    }

    msgDiv.innerHTML = `
      <div class="bubble">${text}</div>
      ${memDetails?.length ? `<button class="show-details-btn" onclick="toggleBreakdown(this)">▾ Show Memory Details</button>` : ""}
      ${breakdownHTML}
    `;

    msgs.appendChild(msgDiv);
    msgs.scrollTop = msgs.scrollHeight;
  }

  function toggleBreakdown(btn) {
    const bd = btn.nextElementSibling;
    if (!bd) return;
    const isOpen = bd.classList.toggle("open");
    btn.textContent = isOpen ? "▴ Hide Memory Details" : "▾ Show Memory Details";
  }

  function updateAgentStats(stats) {
    if (!stats) return;
    document.getElementById("agentStats").innerHTML = `
      <span>Steps: <b>${stats.steps}</b></span>
      <span>ε: <b>${stats.epsilon}</b></span>
      <span>Avg Reward: <b>${stats.avg_reward}</b></span>
    `;
  }

  function updatePersistentMemory(persistent) {
    const el = document.getElementById("persistentMemory");
    if (!persistent || persistent.length === 0) {
      el.innerHTML = '<p class="empty-state">Nothing stored yet.</p>';
      return;
    }
    el.innerHTML = persistent.map(p => `
      <div class="mem-item">
        <span class="mem-key">${p.concept}</span>
        <span class="mem-val">freq ${p.frequency}</span>
      </div>`).join("");
  }

  function updateConsolidationLog(log) {
    const el = document.getElementById("consolidationLog");
    if (!log || log.length === 0) return;
    const entries = log.map(l => {
      const color = l.action === "STORE" ? "var(--ok)" : l.action === "REINFORCE" ? "var(--mid)" : "var(--warn)";
      return `<div class="log-entry">
        <span style="color:${color}">●</span>
        <span style="color:var(--accent2)">${l.concept}</span>
        <span class="action-badge badge-${l.action}">${l.action}</span>
        <span style="color:var(--muted)">${l.importance}</span>
      </div>`;
    }).join("");
    el.innerHTML = entries + el.innerHTML;
  }

  function toggleSidebar() {
    const sidebar = document.querySelector('.sidebar');
    const overlay = document.querySelector('.sidebar-overlay');
    
    sidebar.classList.toggle('open');
    overlay.classList.toggle('show');
  }
</script>

</body>
</html>
