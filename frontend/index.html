<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>RL Memory System</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet"/>
  <style>
    :root {
      /* Professional Dark Color Palette */
      --bg-main: #0A0B10;
      --bg-surface: #1E1F29;
      --bg-component: #1E1E1E;
      --border-subtle: #2A2D35;
      --text-primary: #E4E6EB;
      --text-secondary: #9EA1A8;
      --accent-professional: #4A9EFF;
      --accent-muted: #5A6B7B;
      --importance-high: #6B7F7B;
      --importance-low: #5A5A5A;
      --gradient-bot: linear-gradient(135deg, #2D303E 0%, #1E202B 100%);
      --gradient-user: #3A3B3C;
      --mono: 'JetBrains Mono', monospace;
      --sans: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      overflow: hidden;
    }

    body {
      background: var(--bg-main);
      color: var(--text-primary);
      font-family: var(--sans);
      display: grid;
      grid-template-columns: 1fr 320px;
      grid-template-rows: 56px 1fr;
      height: 100vh;
    }

    /* ── Header ── */
    header {
      grid-column: 1 / -1;
      padding: 0 24px;
      border-bottom: 1px solid var(--border-subtle);
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--bg-surface);
      backdrop-filter: blur(10px);
      background: rgba(30, 31, 41, 0.8);
      height: 56px;
      flex-shrink: 0;
    }

    header h1 {
      font-size: 1.1rem;
      font-weight: 600;
      letter-spacing: -0.3px;
    }

    header h1 span { color: var(--accent-professional); }

    .agent-stats {
      display: flex;
      gap: 16px;
      font-family: var(--mono);
      font-size: 0.7rem;
      color: var(--text-secondary);
    }

    .agent-stats b { color: var(--accent-professional); }

    /* ── Chat Panel ── */
    .chat-panel {
      display: flex;
      flex-direction: column;
      border-right: 1px solid var(--border-subtle);
      min-height: 0;
      overflow: hidden;
      background: rgba(30, 30, 46, 0.6);
      backdrop-filter: blur(8px);
    }

    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      min-height: 0;
    }

    .msg {
      display: flex;
      flex-direction: column;
      gap: 6px;
      max-width: 88%;
    }

    .msg.user { align-self: flex-end; align-items: flex-end; }
    .msg.bot  { align-self: flex-start; }

    .bubble {
      padding: 12px 16px;
      border-radius: 8px;
      font-size: 0.85rem;
      line-height: 1.5;
      font-weight: 400;
      transition: all 0.15s ease;
    }

    .msg.user .bubble {
      background: var(--gradient-user);
      color: var(--text-primary);
      border-bottom-right-radius: 4px;
    }

    .msg.bot .bubble {
      background: var(--gradient-bot);
      color: var(--text-primary);
      border: 1px solid rgba(42, 45, 53, 0.6);
      border-bottom-left-radius: 4px;
    }

    .show-details-btn {
      font-family: var(--mono);
      font-size: 0.65rem;
      padding: 4px 12px;
      border: 1px solid var(--accent-professional);
      border-radius: 16px;
      background: transparent;
      color: var(--accent-professional);
      cursor: pointer;
      width: fit-content;
      transition: all 0.15s ease;
    }

    .show-details-btn:hover {
      background: var(--accent-professional);
      color: var(--text-primary);
    }

    .memory-breakdown {
      background: rgba(30, 31, 41, 0.7);
      border: 1px solid var(--border-subtle);
      border-radius: 8px;
      padding: 12px;
      font-family: var(--mono);
      font-size: 0.7rem;
      display: none;
      flex-direction: column;
      gap: 10px;
      margin-top: 6px;
      backdrop-filter: blur(6px);
    }

    .memory-breakdown.open { display: flex; }

    .breakdown-section h4 {
      color: var(--text-secondary);
      text-transform: uppercase;
      font-size: 0.6rem;
      letter-spacing: 1px;
      margin-bottom: 6px;
      font-weight: 500;
    }

    .concept-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 4px 0;
      border-bottom: 1px solid var(--border-subtle);
      gap: 6px;
    }

    .concept-row:last-child { border-bottom: none; }
    .concept-name { color: var(--accent-professional); font-weight: 500; min-width: 60px; }

    .importance-bar-wrap {
      width: 60px;
      height: 4px;
      background: var(--border-subtle);
      border-radius: 2px;
      overflow: hidden;
      flex-shrink: 0;
    }

    .importance-bar {
      height: 100%;
      border-radius: 2px;
    }

    .action-badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 12px;
      font-size: 0.6rem;
      font-weight: 500;
      letter-spacing: 0.3px;
      flex-shrink: 0;
    }

    .badge-STORE     { background: rgba(107, 127, 123, 0.2); color: var(--importance-high); border: 1px solid rgba(107, 127, 123, 0.3); }
    .badge-REINFORCE { background: rgba(74, 158, 255, 0.2); color: var(--accent-professional); border: 1px solid rgba(74, 158, 255, 0.3); }
    .badge-REMOVE    { background: rgba(90, 90, 90, 0.2); color: var(--importance-low); border: 1px solid rgba(90, 90, 90, 0.3); }

    .reasons-list { list-style: none; display: flex; flex-direction: column; gap: 3px; }
    .reasons-list li::before { content: "→ "; color: var(--accent-professional); }

    /* ── Input ── */
    .input-area {
      padding: 16px 20px;
      border-top: 1px solid var(--border-subtle);
      display: flex;
      gap: 12px;
      background: rgba(30, 31, 41, 0.8);
      backdrop-filter: blur(10px);
      flex-shrink: 0;
    }

    .input-area input {
      flex: 1;
      background: var(--bg-component);
      border: 1px solid var(--border-subtle);
      border-radius: 8px;
      padding: 12px 16px;
      color: var(--text-primary);
      font-family: var(--sans);
      font-size: 0.88rem;
      outline: none;
      transition: all 0.15s ease;
    }

    .input-area input:focus { 
      border-color: var(--accent-professional);
      box-shadow: 0 0 0 1px rgba(74, 158, 255, 0.2);
    }

    .input-area input::placeholder {
      color: var(--text-secondary);
    }

    .input-area button {
      background: var(--accent-professional);
      color: var(--text-primary);
      border: none;
      border-radius: 8px;
      padding: 12px 16px;
      font-family: var(--sans);
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s ease;
      flex-shrink: 0;
      font-size: 0.85rem;
    }

    .input-area button:hover { 
      background: #3A8FEF;
      transform: translateY(-1px);
    }

    /* ── Sidebar ── */
    .sidebar {
      background: rgba(30, 31, 41, 0.6);
      backdrop-filter: blur(8px);
      display: flex;
      flex-direction: column;
      min-height: 0;
      overflow: hidden;
    }

    .sidebar-top {
      flex-shrink: 0;
      padding: 16px 16px;
      border-bottom: 1px solid var(--border-subtle);
    }

    .sidebar-top h3 {
      font-size: 0.65rem;
      text-transform: uppercase;
      letter-spacing: 1.2px;
      color: var(--text-secondary);
      margin-bottom: 12px;
      font-weight: 500;
    }

    .persistent-scroll {
      max-height: 160px;
      overflow-y: auto;
    }

    .mem-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 0;
      border-bottom: 1px solid var(--border-subtle);
      font-family: var(--mono);
      font-size: 0.72rem;
    }

    .mem-item:last-child { border: none; }
    .mem-key { color: var(--accent-professional); font-weight: 500; }
    .mem-val { color: var(--text-secondary); }

    .sidebar-log {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-height: 0;
      overflow: hidden;
    }

    .sidebar-log h3 {
      font-size: 0.65rem;
      text-transform: uppercase;
      letter-spacing: 1.2px;
      color: var(--text-secondary);
      padding: 16px 16px 8px;
      flex-shrink: 0;
      font-weight: 500;
    }

    .log-scroll {
      flex: 1;
      overflow-y: auto;
      padding: 0 16px 16px;
    }

    .log-entry {
      font-family: var(--mono);
      font-size: 0.68rem;
      padding: 6px 0;
      border-bottom: 1px solid var(--border-subtle);
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .log-entry:last-child { border: none; }

    .empty-state {
      color: var(--text-secondary);
      font-size: 0.75rem;
      font-family: var(--sans);
      font-weight: 400;
      padding: 8px 0;
    }

    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border-subtle); border-radius: 2px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--accent-muted); }
  </style>
</head>
<body>

<header>
  <h1>🧠 RL <span>Memory</span> System</h1>
  <div class="agent-stats" id="agentStats">
    <span>Steps: <b>0</b></span>
    <span>ε: <b>0.300</b></span>
    <span>Avg Reward: <b>—</b></span>
  </div>
</header>

<!-- Chat Panel -->
<div class="chat-panel">
  <div class="messages" id="messages">
    <div class="msg bot">
      <div class="bubble">Hey! Talk to me — I'll remember what matters using reinforcement learning. 🧠</div>
    </div>
  </div>
  <div class="input-area">
    <input type="text" id="userInput" placeholder="Type something..." />
    <button onclick="sendMessage()">Send</button>
  </div>
</div>

<!-- Sidebar -->
<div class="sidebar">
  <div class="sidebar-top">
    <h3>📌 Persistent Memory</h3>
    <div class="persistent-scroll">
      <div id="persistentMemory"><p class="empty-state">Nothing stored yet.</p></div>
    </div>
  </div>
  <div class="sidebar-log">
    <h3>⚡ Consolidation Log</h3>
    <div class="log-scroll" id="consolidationLog">
      <p class="empty-state">Runs every 3 interactions.</p>
    </div>
  </div>
</div>

<script type="module">
  /**
   * API Configuration
   * Use environment variable for production, fallback to localhost for development
   */
  const API_BASE = import.meta.env.VITE_API_URL || "http://localhost:10000";
  // Remove trailing slash to prevent double slashes
  const API = API_BASE.replace(/\/$/, "");

  document.getElementById("userInput").addEventListener("keydown", e => {
    if (e.key === "Enter") sendMessage();
  });

  // Expose functions to global scope for HTML event handlers
  window.sendMessage = sendMessage;
  window.toggleBreakdown = toggleBreakdown;

  async function sendMessage() {
    const input = document.getElementById("userInput");
    const text = input.value.trim();
    if (!text) return;
    input.value = "";

    appendMessage("user", text);
    
    console.log("Requesting backend at:", API);

    try {
      const res = await fetch(`${API}/chat`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ message: text }),
      });
      const data = await res.json();
      appendBotMessage(data.response, data.memory_details);
      updateAgentStats(data.agent_stats);
      updatePersistentMemory(data.persistent_memory);
      updateConsolidationLog(data.consolidation_log);
    } catch (err) {
      appendMessage("bot", "⚠️ Could not reach backend. Make sure Flask is running.");
    }
  }

  function appendMessage(role, text) {
    const msgs = document.getElementById("messages");
    const div = document.createElement("div");
    div.className = `msg ${role}`;
    div.innerHTML = `<div class="bubble">${text}</div>`;
    msgs.appendChild(div);
    msgs.scrollTop = msgs.scrollHeight;
  }

  function appendBotMessage(text, memDetails) {
    const msgs = document.getElementById("messages");
    const msgDiv = document.createElement("div");
    msgDiv.className = "msg bot";

    let breakdownHTML = "";
    if (memDetails && memDetails.length) {
      const conceptsStr = memDetails.map(m => m.concept).join(", ");
      const conceptRows = memDetails.map(m => {
        const impPct = Math.round(m.importance * 100);
        const barColor = impPct >= 65 ? "var(--ok)" : impPct >= 35 ? "var(--mid)" : "var(--warn)";
        return `
          <div class="concept-row">
            <span class="concept-name">${m.concept}</span>
            <span style="color:var(--muted)">${m.frequency}</span>
            <div class="importance-bar-wrap">
              <div class="importance-bar" style="width:${impPct}%;background:${barColor}"></div>
            </div>
            <span style="font-weight:600;font-size:0.68rem">${m.importance}</span>
            <span class="action-badge badge-${m.action}">${m.action}</span>
          </div>`;
      }).join("");

      const reasonsHTML = (memDetails[0]?.reasons || []).map(r => `<li>${r}</li>`).join("");

      breakdownHTML = `
        <div class="memory-breakdown">
          <div class="breakdown-section">
            <h4>Detected Concepts</h4>
            <p style="color:var(--accent2);font-weight:600;font-size:0.72rem">${conceptsStr}</p>
          </div>
          <div class="breakdown-section">
            <h4>Importance + RL Decision</h4>
            ${conceptRows}
          </div>
          <div class="breakdown-section">
            <h4>Reasons (top concept)</h4>
            <ul class="reasons-list">${reasonsHTML}</ul>
          </div>
        </div>`;
    }

    msgDiv.innerHTML = `
      <div class="bubble">${text}</div>
      ${memDetails?.length ? `<button class="show-details-btn" onclick="toggleBreakdown(this)">▾ Show Memory Details</button>` : ""}
      ${breakdownHTML}
    `;

    msgs.appendChild(msgDiv);
    msgs.scrollTop = msgs.scrollHeight;
  }

  function toggleBreakdown(btn) {
    const bd = btn.nextElementSibling;
    if (!bd) return;
    const isOpen = bd.classList.toggle("open");
    btn.textContent = isOpen ? "▴ Hide Memory Details" : "▾ Show Memory Details";
  }

  function updateAgentStats(stats) {
    if (!stats) return;
    document.getElementById("agentStats").innerHTML = `
      <span>Steps: <b>${stats.steps}</b></span>
      <span>ε: <b>${stats.epsilon}</b></span>
      <span>Avg Reward: <b>${stats.avg_reward}</b></span>
    `;
  }

  function updatePersistentMemory(persistent) {
    const el = document.getElementById("persistentMemory");
    if (!persistent || persistent.length === 0) {
      el.innerHTML = '<p class="empty-state">Nothing stored yet.</p>';
      return;
    }
    el.innerHTML = persistent.map(p => `
      <div class="mem-item">
        <span class="mem-key">${p.concept}</span>
        <span class="mem-val">freq ${p.frequency}</span>
      </div>`).join("");
  }

  function updateConsolidationLog(log) {
    const el = document.getElementById("consolidationLog");
    if (!log || log.length === 0) return;
    const entries = log.map(l => {
      const color = l.action === "STORE" ? "var(--ok)" : l.action === "REINFORCE" ? "var(--mid)" : "var(--warn)";
      return `<div class="log-entry">
        <span style="color:${color}">●</span>
        <span style="color:var(--accent2)">${l.concept}</span>
        <span class="action-badge badge-${l.action}">${l.action}</span>
        <span style="color:var(--muted)">${l.importance}</span>
      </div>`;
    }).join("");
    el.innerHTML = entries + el.innerHTML;
  }
</script>

</body>
</html>
