services:
  - type: web
    name: rl-memory-backend
    env: python
    buildCommand: pip install -r requirements.txt && python -m spacy download en_core_web_sm
    startCommand: python run.py
    envVars:
      - key: PORT
        value: 5000
      - key: FLASK_DEBUG
        value: false
      - key: OLLAMA_URL
        value: http://your-ollama-host:11434
      - key: OLLAMA_MODEL
        value: llama3.2
      - key: FRONTEND_URL
        value: "*"
